<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign In — Aura</title>
<script>window.AURA_API_BASE = 'https://auracompanion-production.up.railway.app/api';</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  var SUPA_URL = 'https://jtgaxhucflemgnpfjgbu.supabase.co';
  var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0Z2F4aHVjZmxlbWducGZqZ2J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzcwMzAsImV4cCI6MjA5NDgxMzAzMH0.D5f9UViBd6T15Ds2KiE2grkj_Y4YEma_nEJW5KmpmqE';
  var _supaClient = null;
  function getSupabase() {
    if (!_supaClient) _supaClient = supabase.createClient(SUPA_URL, SUPA_KEY);
    return _supaClient;
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f7f8fb;
    --ink: #0a0e27;
    --ink-soft: #3d4663;
    --ink-mute: #6b7390;
    --line: #e6e8f0;
    --hue-a: 280;
  }
  html.dark {
    --bg: #0a0e27;
    --bg-soft: #11162e;
    --ink: #ffffff;
    --ink-soft: #c9cde3;
    --ink-mute: #8a91b3;
    --line: #1f2547;
  }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Geist', system-ui, sans-serif;
  }
  .aura-mesh {
    background:
      radial-gradient(60% 80% at 80% 20%, oklch(76% 0.18 var(--hue-a) / .9) 0%, transparent 60%),
      radial-gradient(50% 70% at 20% 30%, oklch(78% 0.16 280 / .9) 0%, transparent 60%),
      linear-gradient(180deg, #fef6ff 0%, #fff7ee 100%);
    filter: blur(0.4px);
  }
</style>
</head>
<body class="aura-mesh">

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function AuthPage() {
  const [isLogin, setIsLogin] = useState(true);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [fullName, setFullName] = useState('');
  const [termsAccepted, setTermsAccepted] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState('');

  // Handle OAuth callback — Supabase may redirect back here with a hash token
  useEffect(() => {
    const hash = window.location.hash.slice(1);
    if (!hash) return;
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');
    if (token) {
      // Store token then go to app
      try { sessionStorage.setItem('aura_token', token); } catch(e) {}
      history.replaceState(null, '', window.location.pathname);
      window.location.href = '/aura.html';
    }
    // Also handle ?error= from Supabase
    const urlParams = new URLSearchParams(window.location.search);
    const urlError = urlParams.get('error_description') || urlParams.get('error');
    if (urlError) setError(decodeURIComponent(urlError));
  }, []);

  const handleOAuth = async (provider) => {
    setError('');
    setLoading(true);
    try {
      const redirectTo = window.location.origin + '/aura.html';
      const { error: oauthError } = await getSupabase().auth.signInWithOAuth({
        provider: provider,
        options: { redirectTo },
      });
      if (oauthError) {
        setError(oauthError.message || 'OAuth sign-in failed.');
        setLoading(false);
      }
      // On success, Supabase redirects the browser — no further action needed here
    } catch (err) {
      setError('Failed to initiate sign in. Please try again.');
      setLoading(false);
    }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setSuccess('');
    setLoading(true);

    try {
      const endpoint = isLogin ? '/auth/login' : '/auth/signup';
      const payload = isLogin
        ? { email, password }
        : { email, password, full_name: fullName, terms_accepted: termsAccepted };

      const response = await fetch(`${window.AURA_API_BASE}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await response.json();

      if (!response.ok) {
        setError(data.error || 'Something went wrong');
        setLoading(false);
        return;
      }

      // Store token in sessionStorage (matches aura.html's supaStoreToken)
      try { sessionStorage.setItem('aura_token', data.token); } catch(e) {}
      try { sessionStorage.setItem('aura_user', JSON.stringify(data.user)); } catch(e) {}

      setSuccess(data.message);
      setTimeout(() => {
        window.location.href = '/aura.html';
      }, 1500);
    } catch (err) {
      setError('Failed to connect to server. Please try again.');
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div className="w-full max-w-md">
        {/* Header */}
        <div className="text-center mb-8">
          <h1 className="text-4xl font-bold mb-2">Aura</h1>
          <p className="text-ink-soft">AI companions that actually remember you</p>
        </div>

        {/* Form Card */}
        <div className="bg-white dark:bg-gray-900 rounded-2xl shadow-lg p-8 border border-line">
          <h2 className="text-2xl font-bold mb-6">
            {isLogin ? 'Sign In' : 'Create Account'}
          </h2>

          {error && (
            <div className="mb-4 p-3 bg-red-100 text-red-800 rounded-lg text-sm">
              {error}
            </div>
          )}

          {success && (
            <div className="mb-4 p-3 bg-green-100 text-green-800 rounded-lg text-sm">
              {success}
            </div>
          )}

          {/* OAuth Options */}
          <div className="space-y-3 mb-6">
            <button
              type="button"
              onClick={() => handleOAuth('google')}
              className="w-full px-4 py-2 border border-line rounded-lg bg-bg hover:bg-bg-soft text-ink font-medium transition flex items-center justify-center gap-2"
            >
              <span>🔵</span> Continue with Google
            </button>
            <button
              type="button"
              onClick={() => handleOAuth('apple')}
              className="w-full px-4 py-2 border border-line rounded-lg bg-bg hover:bg-bg-soft text-ink font-medium transition flex items-center justify-center gap-2"
            >
              <span>🍎</span> Continue with Apple
            </button>
          </div>

          {/* Divider */}
          <div className="relative mb-6">
            <div className="absolute inset-0 flex items-center">
              <div className="w-full border-t border-line"></div>
            </div>
            <div className="relative flex justify-center text-sm">
              <span className="px-2 bg-white dark:bg-gray-900 text-ink-mute">Or with email</span>
            </div>
          </div>

          <form onSubmit={handleSubmit} className="space-y-4">
            {/* Full Name (Sign Up Only) */}
            {!isLogin && (
              <div>
                <label className="block text-sm font-medium mb-1">Full Name</label>
                <input
                  type="text"
                  value={fullName}
                  onChange={(e) => setFullName(e.target.value)}
                  placeholder="John Doe"
                  required={!isLogin}
                  className="w-full px-4 py-2 border border-line rounded-lg bg-bg text-ink focus:outline-none focus:ring-2 focus:ring-purple-500"
                />
              </div>
            )}

            {/* Email */}
            <div>
              <label className="block text-sm font-medium mb-1">Email</label>
              <input
                type="email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                placeholder="you@example.com"
                required
                className="w-full px-4 py-2 border border-line rounded-lg bg-bg text-ink focus:outline-none focus:ring-2 focus:ring-purple-500"
              />
            </div>

            {/* Password */}
            <div>
              <label className="block text-sm font-medium mb-1">Password</label>
              <input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                placeholder="••••••••"
                required
                className="w-full px-4 py-2 border border-line rounded-lg bg-bg text-ink focus:outline-none focus:ring-2 focus:ring-purple-500"
              />
              {isLogin && <p className="text-xs text-ink-mute mt-1">Demo: use any email/password</p>}
            </div>

            {/* Terms Acceptance (Sign Up Only) */}
            {!isLogin && (
              <div className="flex items-start gap-3 mt-6">
                <input
                  type="checkbox"
                  id="terms"
                  checked={termsAccepted}
                  onChange={(e) => setTermsAccepted(e.target.checked)}
                  className="mt-1 w-4 h-4"
                  required
                />
                <label htmlFor="terms" className="text-sm text-ink-soft">
                  I agree to the{' '}
                  <a href="/terms.html" target="_blank" className="text-purple-600 hover:underline font-medium">
                    Terms of Service
                  </a>{' '}
                  and{' '}
                  <a href="/privacy.html" target="_blank" className="text-purple-600 hover:underline font-medium">
                    Privacy Policy
                  </a>
                </label>
              </div>
            )}

            {/* Submit Button */}
            <button
              type="submit"
              disabled={loading || (!isLogin && !termsAccepted)}
              className="w-full mt-6 px-4 py-2 bg-purple-600 hover:bg-purple-700 disabled:bg-gray-400 text-white font-medium rounded-lg transition"
            >
              {loading ? 'Processing...' : isLogin ? 'Sign In' : 'Create Account'}
            </button>
          </form>

          {/* Toggle Sign In / Sign Up */}
          <div className="mt-6 text-center text-sm text-ink-soft">
            {isLogin ? "Don't have an account?" : 'Already have an account?'}{' '}
            <button
              type="button"
              onClick={() => {
                setIsLogin(!isLogin);
                setError('');
                setSuccess('');
              }}
              className="text-purple-600 hover:underline font-medium"
            >
              {isLogin ? 'Sign Up' : 'Sign In'}
            </button>
          </div>

          {/* Back to Home */}
          <div className="mt-4 text-center">
            <a href="/" className="text-sm text-ink-mute hover:text-ink transition">
              ← Back to Home
            </a>
          </div>
        </div>

        {/* Footer Note */}
        <p className="text-center text-xs text-ink-mute mt-6">
          By signing up, you agree to our Terms of Service and Privacy Policy
        </p>
      </div>
    </div>
  );
}

ReactDOM.render(<AuthPage />, document.getElementById('root'));
</script>

</body>
</html>
